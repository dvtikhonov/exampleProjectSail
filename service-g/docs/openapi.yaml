openapi: 3.0.3
info:
  title: service-g — To-Do List API
  description: |
    REST API для приложения To-Do List (Laravel 13 + Sanctum).

    **Авторизация:** Sanctum SPA (session cookie), не Bearer token.
    Клиент и API должны быть на одном origin (например `http://listtodo.localhost:8080` через nginx-gateway).

    **CSRF:** перед `POST`, `PUT`, `PATCH`, `DELETE` выполните `GET /sanctum/csrf-cookie`,
    затем передавайте заголовок `X-XSRF-TOKEN` (значение из cookie `XSRF-TOKEN`, URL-decoded).

    **Роли:** `user` видит и изменяет только свои задачи; `admin` видит все задачи, редактирует и удаляет только свои.

    **Вход:** после 5 неудачных попыток login блокируется rate limiter (ответ `422`, ошибка в `errors.email`).

    **Создание задачи:** поле `due_date` обязательно (`required`, не раньше сегодня).
  version: 1.0.0
  contact:
    name: service-g
servers:
  - url: http://listtodo.localhost:8080/api
    description: Gateway API (рекомендуется для Sanctum)
  - url: http://localhost:8088/api
    description: Laravel API напрямую (отладка)
  - url: http://listtodo.localhost:8080
    description: Gateway без префикса /api (Sanctum CSRF)
  - url: http://localhost:8088
    description: Laravel напрямую (health, service info, тестовые HTML-страницы)

tags:
  - name: Auth
    description: Регистрация, вход, выход, текущий пользователь
  - name: Tasks
    description: CRUD задач с фильтрацией, поиском и пагинацией
  - name: Docs
    description: Документация API
  - name: Service
    description: Health check, информация о сервисе, Sanctum CSRF

paths:
  /sanctum/csrf-cookie:
    servers:
      - url: http://listtodo.localhost:8080
        description: Gateway (рекомендуется)
      - url: http://localhost:8088
        description: Laravel напрямую
    get:
      tags: [Service]
      summary: Получить CSRF-cookie для Sanctum SPA
      description: |
        Вызовите перед первым `POST`/`PUT`/`PATCH`/`DELETE` к API.
        Устанавливает cookies `XSRF-TOKEN` и сессию; далее передавайте заголовок `X-XSRF-TOKEN`
        (значение из cookie `XSRF-TOKEN`, URL-decoded).
      operationId: getCsrfCookie
      responses:
        '204':
          description: CSRF-cookie установлены (тело пустое)

  /up:
    servers:
      - url: http://localhost:8088
        description: Laravel напрямую
    get:
      tags: [Service]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Сервис доступен

  /:
    servers:
      - url: http://localhost:8088
        description: Laravel напрямую
    get:
      tags: [Service]
      summary: Информация о сервисе и ссылках на API
      operationId: getServiceInfo
      responses:
        '200':
          description: JSON с путями к auth API, tasks и OpenAPI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfoResponse'

  /docs/openapi.yaml:
    get:
      tags: [Docs]
      summary: OpenAPI-спецификация (этот файл)
      operationId: getOpenApiSpec
      responses:
        '200':
          description: YAML-файл OpenAPI 3.0
          content:
            application/yaml:
              schema:
                type: string

  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация (dev-удобство, не обязательна при использовании seeded users)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан и аутентифицирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход по email и паролю
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: |
            Ошибка валидации, неверные credentials (`errors.email`) или throttle
            после 5 неудачных попыток (`errors.email`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход из сессии
      operationId: logout
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Сессия завершена
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user:
    get:
      tags: [Auth]
      summary: Текущий аутентифицированный пользователь
      operationId: getCurrentUser
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks:
    get:
      tags: [Tasks]
      summary: Список задач
      description: |
        **user:** только свои задачи.
        **admin:** все задачи; в элементах `data` присутствует `owner_name` владельца.

        Пустые query-строки (`status=`, `search=` и т.д.) приводятся к `null` до валидации.
      operationId: listTasks
      security:
        - sanctumCookie: []
      parameters:
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/direction'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Пагинированный список задач
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasksResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

    post:
      tags: [Tasks]
      summary: Создание задачи
      description: |
        `user_id` проставляется автоматически из текущей сессии.
        Поля `title`, `due_date` и `status` обязательны.
      operationId: createTask
      security:
        - sanctumCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTaskRequest'
      responses:
        '201':
          description: Задача создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/taskId'

    get:
      tags: [Tasks]
      summary: Просмотр одной задачи
      description: |
        **admin** при просмотре чужой задачи получает поле `owner_name`.
      operationId: showTask
      security:
        - sanctumCookie: []
      responses:
        '200':
          description: Задача
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Tasks]
      summary: Полное обновление задачи
      operationId: updateTaskPut
      security:
        - sanctumCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Задача обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      tags: [Tasks]
      summary: Частичное обновление задачи
      description: |
        Обновляются только явно переданные поля (`sometimes`).
        Если передан `due_date`, он обязателен и не может быть пустым.
      operationId: updateTaskPatch
      security:
        - sanctumCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Задача обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Tasks]
      summary: Удаление задачи
      operationId: deleteTask
      security:
        - sanctumCookie: []
      responses:
        '204':
          description: Задача удалена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sanctumCookie:
      type: apiKey
      in: cookie
      name: laravel_session
      description: |
        Sanctum stateful session. Требуется предварительный `GET /sanctum/csrf-cookie`
        и заголовок `X-XSRF-TOKEN` для state-changing запросов.
        Запросы с `credentials: include` (fetch) или cookie jar (curl).

  parameters:
    taskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: ID задачи

    status:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TaskStatus'
      description: Фильтр по статусу

    search:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 255
      description: Поиск по `title` и `description` (LIKE)

    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [due_date, status, created_at]
        default: created_at
      description: Поле сортировки

    direction:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Направление сортировки

    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 5

  schemas:
    UserRole:
      type: string
      enum: [user, admin]

    TaskStatus:
      type: string
      enum: [pending, in_progress, completed]

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        remember:
          type: boolean
          default: false

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Приводится к нижнему регистру (`lowercase`)
        password:
          type: string
          format: password
          description: Правила `Password::defaults()` Laravel
        password_confirmation:
          type: string
          format: password

    Task:
      type: object
      required:
        - id
        - title
        - status
        - user_id
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
          example: '2026-07-20'
        status:
          $ref: '#/components/schemas/TaskStatus'
        user_id:
          type: integer
          format: int64
        owner_name:
          type: string
          description: Имя владельца задачи (только для роли admin)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Task'

    PaginationMeta:
      type: object
      required: [current_page, last_page, per_page, total]
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    PaginatedTasksResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    StoreTaskRequest:
      type: object
      required: [title, due_date, status]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          description: Обязательная дата, не раньше сегодня (`after_or_equal:today`)
          example: '2026-07-20'
        status:
          $ref: '#/components/schemas/TaskStatus'

    UpdateTaskRequest:
      type: object
      description: Частичное обновление — передавайте только изменяемые поля.
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          description: Если поле передано — обязательно, не раньше сегодня (`after_or_equal:today`)
          example: '2026-07-20'
        status:
          $ref: '#/components/schemas/TaskStatus'

    ServiceInfoResponse:
      type: object
      required:
        - service
        - frontend
        - api
        - login
        - register
        - user
        - tasks
        - openapi
        - login_page
        - register_page
        - test_login_page
        - test_register_page
      properties:
        service:
          type: string
          example: service-g
        frontend:
          type: string
          description: URL Nuxt-фронтенда (`FRONTEND_URL`)
        api:
          type: string
          example: /api
        login:
          type: string
          example: /api/auth/login
        register:
          type: string
          example: /api/auth/register
        user:
          type: string
          example: /api/user
        tasks:
          type: string
          example: /api/tasks
        openapi:
          type: string
          example: /api/docs/openapi.yaml
        login_page:
          type: string
          description: Страница входа на фронтенде
        register_page:
          type: string
          description: Страница регистрации на фронтенде
        test_login_page:
          type: string
          description: Тестовая Blade-страница входа (localhost:8088)
        test_register_page:
          type: string
          description: Тестовая Blade-страница регистрации (localhost:8088)

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ErrorMessage:
      type: object
      properties:
        message:
          type: string

  responses:
    Unauthorized:
      description: Не аутентифицирован (401)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: Unauthenticated.

    Forbidden:
      description: Нет прав на операцию (403)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: This action is unauthorized.

    NotFound:
      description: Ресурс не найден (404)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: No query results for model [App\Models\Task].

    ValidationError:
      description: Ошибка валидации (422)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
