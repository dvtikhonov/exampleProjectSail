#volumes:
#  mysql-data:
#  main-app-storage:
#  main-app-bootstrap:

services:
  main-app:
    build:
      context: ./main-app
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MAIN_APP_PORT:-80}:8000" # внешний 80 -> внутренний 8000 (Nginx)
      - "5173:5173"                  # Vite
    environment:
      - APP_ENV=local
      - APP_URL=http://main-app
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal   # доступ к внешнему MySQL
      - DB_PORT=3306
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal} client_port=${XDEBUG_CLIENT_PORT:-9003} start_with_request=trigger connect_timeout_ms=500 log_level=0
#  включить для PHPSTORM, по необходимости для принудительных запросов
#      - XDEBUG_MODE=debug,develop
#      - XDEBUG_CONFIG=client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal} client_port=${XDEBUG_CLIENT_PORT:-9003} start_with_request=yes connect_timeout_ms=5000 log_level=7 log=/tmp/xdebug.log
      - PHP_IDE_CONFIG=serverName=main-app
#      - DB_CONNECTION=mysql
#      - DB_HOST=mysql                # Один и тот же хост
#      - DB_PORT=3306
#      - DB_DATABASE=main_db          # разное имя БД
#      - DB_USERNAME=root
#      - DB_PASSWORD=root
#    volumes:
#      - ./main-app:/var/www/html
    volumes:
      - ./main-app/app:/var/www/html/app
      - ./main-app/routes:/var/www/html/routes
      - ./main-app/config:/var/www/html/config
      - ./main-app/database:/var/www/html/database
      - ./main-app/resources:/var/www/html/resources
      - ./main-app/tests:/var/www/html/tests
      - ./main-app/public:/var/www/html/public
      - ./main-app/phpunit.xml:/var/www/html/phpunit.xml:ro
      - ./main-app/.env.testing:/var/www/html/.env.testing:ro
      - ./main-app/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      # bind mount вместо томов
      - ./main-app/storage:/var/www/html/storage
      - ./main-app/bootstrap:/var/www/html/bootstrap/cache
#    entrypoint: ""
#    command: ["php", "-S", "0.0.0.0:8000", "-t", "public"]
    networks:
      - internal
    depends_on:
#      - mysql
      - redis

  service-a:
    build:
      context: .
      dockerfile: service-a/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVICE_A_PORT:-8081}:8000"
    environment:
      - APP_ENV=local
      - APP_URL=http://service-a
      - LOG_CHANNEL=stderr
      - XDEBUG_MODE=debug,develop
      - PHP_IDE_CONFIG=serverName=service-a
#      - DB_CONNECTION=mysql
#      - DB_HOST=mysql
#      - DB_PORT=3306
#      - DB_DATABASE=service_a_db     # своя БД
#      - DB_USERNAME=root
#      - DB_PASSWORD=root
    volumes:
      - ./service-a:/var/www/html
      - ./service-a/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - ./shared:/var/www/shared
    networks:
      - internal
    depends_on:
#      - mysql
      - redis

  service-b:
    build:
      context: .
      dockerfile: service-b/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVICE_B_PORT:-8082}:8000"
    environment:
      - APP_ENV=local
      - APP_URL=http://service-b
      - CACHE_STORE=file
      - DB_QUEUE_RETRY_AFTER=960
      - SALES_OUTLETS_EXPORT_FAKE_DELAY_SECONDS=10
      - DB_CONNECTION=mysql
      - DB_HOST=${SERVICE_B_DB_HOST:-host.docker.internal}
      - DB_PORT=${SERVICE_B_DB_PORT:-3306}
      - DB_DATABASE=${SERVICE_B_DB_DATABASE:-sail_db}
      - DB_USERNAME=${SERVICE_B_DB_USERNAME:-root}
      - DB_PASSWORD=${SERVICE_B_DB_PASSWORD:-12345678AS}
    volumes:
#      - ./service-b:/var/www/html
      - ./service-b/app:/var/www/html/app
      - ./service-b/routes:/var/www/html/routes
      - ./service-b/config:/var/www/html/config
      - ./service-b/database:/var/www/html/database
      - ./service-b/resources:/var/www/html/resources
      - ./service-b/tests:/var/www/html/tests
      - ./service-b/phpunit.xml:/var/www/html/phpunit.xml:ro
      - ./service-b/storage:/var/www/html/storage
      - ./service-b/vendor:/var/www/html/vendor
      - ./service-b/composer.json:/var/www/html/composer.json:ro
      - ./service-b/composer.lock:/var/www/html/composer.lock:ro
      - ./service-b/.env:/var/www/html/.env:ro
      - ./service-b/.env.testing:/var/www/html/.env.testing:ro
      - ./shared:/var/www/shared
      # НЕ монтируем vendor и bootstrap/cache
    networks:
      - internal
    depends_on:
#      - mysql
      - redis

  service-b-queue:
    build:
      context: .
      dockerfile: service-b/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan queue:work --timeout=900 --tries=1
    environment:
      - APP_ENV=local
      - APP_URL=http://service-b
      - CACHE_STORE=file
      - DB_QUEUE_RETRY_AFTER=960
      - SALES_OUTLETS_EXPORT_FAKE_DELAY_SECONDS=10
      - DB_CONNECTION=mysql
      - DB_HOST=${SERVICE_B_DB_HOST:-host.docker.internal}
      - DB_PORT=${SERVICE_B_DB_PORT:-3306}
      - DB_DATABASE=${SERVICE_B_DB_DATABASE:-sail_db}
      - DB_USERNAME=${SERVICE_B_DB_USERNAME:-root}
      - DB_PASSWORD=${SERVICE_B_DB_PASSWORD:-12345678AS}
    volumes:
      - ./service-b/app:/var/www/html/app
      - ./service-b/routes:/var/www/html/routes
      - ./service-b/config:/var/www/html/config
      - ./service-b/database:/var/www/html/database
      - ./service-b/resources:/var/www/html/resources
      - ./service-b/tests:/var/www/html/tests
      - ./service-b/storage:/var/www/html/storage
      - ./service-b/vendor:/var/www/html/vendor
      - ./service-b/composer.json:/var/www/html/composer.json:ro
      - ./service-b/composer.lock:/var/www/html/composer.lock:ro
      - ./service-b/.env:/var/www/html/.env:ro
      - ./service-b/.env.testing:/var/www/html/.env.testing:ro
      - ./shared:/var/www/shared
    networks:
      - internal
    depends_on:
      - service-b
      - redis

  # ----- Единый сервер MySQL -----
#  mysql:
#    image: mysql:8.0
#    ports:
#      - "${MYSQL_PORT:-3306}:3306"
#    environment:
#      MYSQL_ROOT_PASSWORD: root
#      # Не создаём БД автоматически – создадим вручную или через миграции
#    volumes:
#      - mysql-data:/var/lib/mysql
#    networks:
#      - internal

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - internal

  mailhog:
    image: mailhog/mailhog
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    networks:
      - internal

  # API Gateway на Nginx
  gateway:
    build: ./nginx-gateway
    container_name: nginx-gateway
    ports:
      - "8080:80"
      - "443:443"
#    volumes:
#      - ./nginx-gateway/nginx.conf:/etc/nginx/nginx.conf
#      - ./nginx-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
#      - ./nginx-gateway/auth.lua:/etc/nginx/lua/auth.lua:ro
#    command: sh -c "nginx -g 'daemon off; error_log /dev/stderr debug; access_log /dev/stdout main;'"
#    command: sh -c "nginx -g 'daemon off; error_log /dev/stderr debug;'"
#    command: sh -c "nginx -g 'daemon off; error_log /dev/stderr debug;' 2>&1 | tee /proc/1/fd/1"
    environment:
      - PASSPORT_CLIENT_ID=019e0a2e-2208-732f-b7aa-96adf97d435a
      - PASSPORT_CLIENT_SECRET=${PASSPORT_CLIENT_SECRET}
    depends_on:
      - main-app
      - service-a
      - service-b
    networks:
      - internal

networks:
  internal:
    driver: bridge
