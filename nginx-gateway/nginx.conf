worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Буфер для кэширования результатов auth_request (снижаем нагрузку на main-app)
    proxy_cache_path /var/cache/nginx/auth_cache levels=1:2 keys_zone=auth_cache:10m max_size=128m inactive=60m;

    # Основной upstream для запросов к сервисам
    upstream main_app {
        server main-app:8000;   # порт, на котором слушает Laravel внутри контейнера
    }
    upstream service_a {
        server service-a:8000;
    }
    upstream service_b {
        server service-b:8000;
    }

    server {
        listen 80;
        server_name api.example.com localhost;   # замените на свой домен
#        server_name localhost:8000;   # замените на свой домен

     # Главный корень - на main-app
        location / {
            proxy_pass http://main-app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Пример для API маршрутов с проверкой авторизации
        location /api/main/ {
            auth_request /auth/verify;
            # ...
            proxy_pass http://main-app:8000/;
        }

        # Открытые эндпоинты (не требуют токена)
        location ~ ^/(login|register|oauth/token) {
            proxy_pass http://main_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Основная проверка для всех API-запросов
        location /api {
            auth_request /auth-check;
            auth_request_set $auth_status $upstream_status;

            # Прокси на соответствующий сервис в зависимости от пути
            if ($uri ~ ^/api/main/) {
                rewrite ^/api/main/(.*) /$1 break;
                proxy_pass http://main_app;
            }
            if ($uri ~ ^/api/a/) {
                rewrite ^/api/a/(.*) /$1 break;
                proxy_pass http://service_a;
            }
            if ($uri ~ ^/api/b/) {
                rewrite ^/api/b/(.*) /$1 break;
                proxy_pass http://service_b;
            }

            # Стандартные прокси-заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;  # передаём исходный токен
        }

        # Внутренний location для проверки токена
        location = /auth-check {
            internal;
            proxy_cache auth_cache;
            proxy_cache_key "$http_authorization";
            proxy_cache_valid 200 5m;    # кэшируем успешную проверку на 5 минут
            proxy_cache_valid 401 1m;    # неудачную – на 1 минуту

            proxy_pass http://main_app/api/auth/check;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }
    }
}