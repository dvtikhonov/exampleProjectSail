worker_processes auto;

events {
    worker_connections 1024;
}

http {
#    include       /etc/nginx/mime.types;
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    # Буфер для кэширования результатов auth_request (снижаем нагрузку на main-app)
    proxy_cache_path /var/cache/nginx/auth_cache levels=1:2 keys_zone=auth_cache:10m max_size=128m inactive=60m;

    map $http_authorization $skip_auth_cache {
        "" 1;
        default 0;
    }

    server {
        listen 80;
        server_name localhost;

        # Эндпоинт для проверки токена (внутренний)
        location = /auth-internal {
            internal;
            set $backend_main "main-app:8000";
            proxy_pass http://$backend_main/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_cache auth_cache;
            proxy_cache_key $http_authorization;
            proxy_cache_valid 200 60s;
            proxy_no_cache $skip_auth_cache;
            proxy_cache_bypass $skip_auth_cache;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_hide_header Set-Cookie;
            add_header X-Auth-Cache $upstream_cache_status always;

            # Передаём заголовки, которые могут активировать Xdebug
#            proxy_set_header Cookie $http_cookie;
#            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Если вы используете параметр запроса XDEBUG_SESSION_START
#            proxy_set_header X-Query-String $args;

            # Принудительно добавляем cookie для активации Xdebug
#            proxy_set_header Cookie "XDEBUG_SESSION=PHPSTORM; $http_cookie";
        }

     # Корень – отдаём main-app (веб-интерфейс, Breeze)
        location / {
            auth_request /auth-internal;
            auth_request_set $auth_status $upstream_status;
            # proxy_pass http://main-app:8000;
            # proxy_pass http://main_app;
            set $backend_main "main-app:8000";
            proxy_pass http://$backend_main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Пробрасываем заголовок с user_id, если его вернёт auth endpoint
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-Id $user_id;
        }

        # Открытые эндпоинты (не требуют токена, без токена)
        location ~ ^/(login|register|oauth/token) {
            # proxy_pass http://main_app;
            set $backend_main "main-app:8000";
            proxy_pass http://$backend_main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # Защита для service-a
        location /api/a/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Vary Origin always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Vary Origin always;

            auth_request /auth-internal;
            auth_request_set $user_id $upstream_http_x_user_id;
            set $backend_a "service-a:8000";
#            access_by_lua_file /etc/nginx/lua/auth.lua;
            rewrite ^/api/a/(.*) /api/$1 break;
            proxy_pass http://$backend_a;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
        }

        # Аналогично для service-b
        location /api/b/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Vary Origin always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Vary Origin always;

            auth_request /auth-internal;
            auth_request_set $user_id $upstream_http_x_user_id;
            set $backend_b "service-b:8000";
#            access_by_lua_file /etc/nginx/lua/auth.lua;
            rewrite ^/api/b/(.*) /api/$1 break;
            proxy_pass http://$backend_b;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
        }
        # MAX webhook service-c — без gateway auth (MAX шлёт POST без Bearer)
        location = /api/c/webhooks/max {
            set $backend_c "service-c:8000";
            proxy_pass http://$backend_c/api/webhooks/max;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Аналогично для service-c
        location /api/c/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Vary Origin always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Vary Origin always;

            auth_request /auth-internal;
            auth_request_set $user_id $upstream_http_x_user_id;
            set $backend_c "service-c:8000";
#            access_by_lua_file /etc/nginx/lua/auth.lua;
            rewrite ^/api/c/(.*) /api/$1 break;
            proxy_pass http://$backend_c;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
        }
    }
}

