; zend_extension не указываем — его добавляет docker-php-ext-enable (иначе «Cannot load Xdebug - it was already loaded»)
xdebug.mode=${XDEBUG_MODE}
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.discover_client_host=0
xdebug.connect_timeout_ms=500
; если start_with_request=trigger, то в url необходимо указать например - http://localhost/objects-sales-outlets-2?XDEBUG_TRIGGER=1 и ловим остановы в PHPSTORM и не мешаем CURSOR
xdebug.start_with_request=trigger
xdebug.trigger_value=1
; /tmp всегда доступен www-data; project storage при bind-mount с хоста часто без записи
xdebug.log=/tmp/xdebug.log
xdebug.log_level=0
; для PHPStorm, принудительная отправка запросов из браузера
;xdebug.log_level=7
;xdebug.mode=develop,debug
;xdebug.connect_timeout_ms=5000
;xdebug.start_with_request=yes
; PhpStorm does not require a fixed idekey; leaving it unset prevents Xdebug
; from issuing a persistent XDEBUG_SESSION cookie on every response.
;xdebug.idekey=PHPSTORM
