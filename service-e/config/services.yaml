# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # Конфигурация DI: autowire + явные alias контрактов → реализаций (SOLID).
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Классы src/ регистрируются как сервисы по FQCN.
    App\:
        resource: '../src/'

    App\Contract\Auth\GatewayUserResolverInterface:
        alias: App\Service\Auth\DoctrineGatewayUserResolver

    App\Contract\Auth\GatewayAuthSessionInterface:
        alias: App\Service\Auth\RequestGatewayAuthSession

    App\Contract\Auth\GatewayUserContextInterface:
        alias: App\Service\Auth\RequestGatewayUserContext

    App\Contract\SalesOutlets\SalesOutletRepositoryInterface:
        alias: App\Repository\DoctrineSalesOutletRepository

    App\Contract\SalesOutlets\SalesOutletServiceInterface:
        alias: App\Service\SalesOutletService

    App\Contract\SalesOutlets\SalesOutletsMetadataRepositoryInterface:
        alias: App\Repository\SalesOutletsMetadataRepository

    App\Contract\SalesOutlets\SalesOutletTableMetaProviderInterface:
        alias: App\Service\ConfigSalesOutletTableMetaProvider
